name: tasksbhulejai
description: "A highly attractive, cross-platform Task and Deadline Tracker app for students."
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database (Isar)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2

  # Routing
  go_router: ^13.2.0

  # Notifications & Reminders
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # UI & Design
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  animations: ^2.0.11
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
